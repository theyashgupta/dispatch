name: PR Title

# Contributor PR titles must follow Conventional Commits, the same convention used
# for commits — it keeps the changelog and release notes clean.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            test
            chore
            perf
            docs
            ci
            style
            build
